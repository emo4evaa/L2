<!DOCTYPE html>
<html>
    <head>
        <title>format</title>
    </head>
    <body>
        <b>hello i am eva</b> <br>
        <strong>hello i am eva </strong> <br>
        <i>hello i am eva</i> <br>
        <em>hello i am eva</em> <br>
        <mark>hello i am eva</mark> <br>
        <small>hello i am eva</small> <br>
        <del>hello i am eva</del> <br>
        hello i am <sub>eva</sub> <br>
        <sup>hello</sup> i am eva <br>
    </body>
</html>
